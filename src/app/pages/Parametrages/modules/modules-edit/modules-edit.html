<p-toast></p-toast>

<div class="modules-form-container">

  <div class="form-card">

    <h2>Edit Module</h2>

    <div class="form-field">

      <label>Module Name</label>

      <input
        pInputText
        type="text"
        [(ngModel)]="module.name"
        placeholder="Enter module name"
      />

    </div>

    <div class="buttons">

      <button
        pButton
        type="button"
        label="Update"
        icon="pi pi-save"
        class="p-button-warning"
        [loading]="loading"
        (click)="updateModule()">
      </button>

      <button
        pButton
        type="button"
        label="Cancel"
        icon="pi pi-times"
        class="p-button-secondary"
        (click)="cancel()">
      </button>

    </div>

  </div>

</div>
